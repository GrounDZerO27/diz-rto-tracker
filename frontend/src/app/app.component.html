<div class="app-shell">
  <header class="app-header" *ngIf="auth.isLoggedIn">
    <div class="header-inner">
      <div class="header-brand">
        <img src="assets/calendar-svgrepo-com.svg" alt="RTO Tracker Logo" class="brand-icon" />
        <div>
          <h1 class="brand-title">RTO Tracker</h1>
          <p class="brand-sub">Return-To-Office Compliance Dashboard</p>
        </div>
      </div>
      <div class="header-user">
        <span class="welcome-text">Welcome, <strong>{{ auth.fullName }}</strong></span>
        <button class="logout-btn" (click)="auth.logout()">Sign Out</button>
      </div>
    </div>
  </header>
  <main class="app-main" [class.no-header]="!auth.isLoggedIn">
    <router-outlet></router-outlet>
  </main>
  <app-footer *ngIf="auth.isLoggedIn"></app-footer>
</div>
