name: Deploy to rto.dizweb.solutions

on:
  push:
    branches: [main]

jobs:
  # ─── 1. Build & Deploy Angular Frontend ───────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Deploy frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 198.54.126.55
          username: ${{ secrets.FTP_USERNAME_PROD }}
          password: ${{ secrets.FTP_PASSWORD_PROD }}
          local-dir: ./frontend/dist/rto-tracker/browser/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

  # ─── 2. Deploy Node.js Backend ────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install production dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Deploy backend source via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 198.54.126.55
          username: ${{ secrets.FTP_USERNAME_PROD }}
          password: ${{ secrets.FTP_PASSWORD_PROD }}
          local-dir: ./backend/
          server-dir: /backend/
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.local
            **/.env.production
            **/data/db.json
            **/data/db.json.bak

      # Touch tmp/restart.txt so cPanel Passenger restarts the Node.js process
      - name: Restart Node.js app (Passenger restart)
        run: |
          curl -s --ftp-create-dirs \
            -T /dev/null \
            "ftp://198.54.126.55/backend/tmp/restart.txt" \
            --user "${{ secrets.FTP_USERNAME_PROD }}:${{ secrets.FTP_PASSWORD_PROD }}"
